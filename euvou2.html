<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador Saraletii Run 2026</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
        .preview { width: 100%; aspect-ratio: 9/16; background: #eee; border-radius: 10px; overflow: hidden; margin: 15px 0; border: 1px solid #ccc; position: relative; }
        canvas { width: 100%; height: 100%; display: block; }
        .controls { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        label { font-size: 11px; font-weight: bold; color: #444; display: block; margin-bottom: 5px; margin-top: 10px; text-transform: uppercase; }
        input[type="range"] { width: 100%; margin-bottom: 10px; accent-color: #2d5a27; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; margin-bottom: 5px; font-size: 14px; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-upload { background: #000; color: #fff; }
        .btn-upload:hover { background: #333; }
        .btn-download { background: #2d5a27; color: #fff; }
        .btn-download:hover { background: #1e3d1a; }
        input[type="file"] { display: none; }
        hr { border: 0; border-top: 1px solid #eee; margin: 15px 0; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn btn-upload" onclick="document.getElementById('atletaInput').click()">1. SELECIONAR FOTO</button>
    <input type="file" id="atletaInput" accept="image/*">

    <div class="preview">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <label>Nome do Atleta</label>
        <input type="text" id="nomeAtleta" placeholder="Ex: MARCOS RENAN" maxlength="30">
        
        <label>Sua Equipe</label>
        <input type="text" id="equipeAtleta" placeholder="Ex: CROATARUN" maxlength="30">

        <hr>

        <label>Zoom da Foto</label>
        <input type="range" id="zoom" min="0.1" max="4" step="0.01" value="1.2">
        <label>Mover Horizontal (X)</label>
        <input type="range" id="posX" min="-800" max="800" value="0">
        <label>Mover Vertical (Y)</label>
        <input type="range" id="posY" min="-800" max="800" value="0">
    </div>

    <button class="btn btn-download" id="downloadBtn">2. BAIXAR IMAGEM</button>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const imgMoldura = new Image();
    const imgAtleta = new Image();
    
    let molduraOK = false;
    let atletaOK = false;

    // Resolução padrão Instagram Stories
    const W = 1080;
    const H = 1920;
    
    // Coordenadas da área onde a foto deve aparecer
    const area = { x: 124, y: 231, w: 832, h: 1046, r: 105 };

    imgMoldura.src = 'euvou.png'; 
    imgMoldura.onload = () => {
        molduraOK = true;
        canvas.width = W;
        canvas.height = H;
        render();
    };

    document.getElementById('atletaInput').onchange = e => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = ev => {
                imgAtleta.onload = () => { 
                    atletaOK = true; 
                    render(); 
                };
                imgAtleta.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }
    };

    // Re-renderiza sempre que houver mudança nos inputs
    document.querySelectorAll('input').forEach(input => {
        input.oninput = render;
    });

    function render() {
        if (!molduraOK) return;

        // 1. Limpa o canvas
        ctx.clearRect(0, 0, W, H);

        // 2. Desenha a Moldura Primeiro (Base)
        ctx.drawImage(imgMoldura, 0, 0, W, H);

        // 3. Desenha a Foto do Atleta
        if (atletaOK) {
            ctx.save();
            
            // "destination-over" faz com que o novo desenho (a foto) 
            // fique ATRÁS do que já existe (a moldura e o texto "EU VOU")
            ctx.globalCompositeOperation = 'destination-over';

            // Criamos o recorte arredondado para a foto não vazar da moldura
            drawRoundedRect(ctx, area.x, area.y, area.w, area.h, area.r);
            ctx.clip();

            const zoom = parseFloat(document.getElementById('zoom').value);
            const px = parseInt(document.getElementById('posX').value);
            const py = parseInt(document.getElementById('posY').value);

            const fw = imgAtleta.width * zoom;
            const fh = imgAtleta.height * zoom;
            const cx = area.x + (area.w / 2) + px;
            const cy = area.y + (area.h / 2) + py;

            ctx.drawImage(imgAtleta, cx - fw/2, cy - fh/2, fw, fh);
            
            ctx.restore();
        }

        // 4. Desenha os Textos Dinâmicos (Sempre por cima de tudo)
        // Resetamos a operação para garantir que o texto fique no topo
        ctx.globalCompositeOperation = 'source-over';
        
        const nome = document.getElementById('nomeAtleta').value.toUpperCase();
        const equipe = document.getElementById('equipeAtleta').value.toUpperCase();

        ctx.textAlign = 'center';
        
        if (nome) {
            ctx.fillStyle = '#1a3a16'; // Verde escuro para o nome
            ctx.font = 'bold 55px sans-serif';
            ctx.fillText(nome, W / 2, 1330); 
        }

        if (equipe) {
            ctx.fillStyle = '#666'; // Cinza para equipe
            ctx.font = '35px sans-serif';
            ctx.fillText(equipe, W / 2, 1385);
        }
    }

    function drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    document.getElementById('downloadBtn').onclick = () => {
        if(!atletaOK) return alert("Selecione sua foto primeiro!");
        const link = document.createElement('a');
        link.download = 'story_saraletii_run.png';
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    };
</script>

</body>
</html>
