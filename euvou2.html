<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador Saraletii Run 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background: #edeff2; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); max-width: 420px; width: 100%; }
        .preview { width: 100%; aspect-ratio: 9/16; background: #ddd; border-radius: 12px; overflow: hidden; margin: 15px 0; border: 2px solid #fff; }
        canvas { width: 100%; height: 100%; display: block; }
        .controls { background: #f8f9fa; padding: 18px; border-radius: 15px; border: 1px solid #eee; }
        label { font-size: 11px; font-weight: 700; color: #555; display: block; margin-bottom: 6px; margin-top: 12px; text-transform: uppercase; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; margin-bottom: 8px; font-size: 14px; }
        input[type="range"] { width: 100%; margin-bottom: 10px; accent-color: #2d5a27; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; transition: 0.3s; }
        .btn-upload { background: #111; color: #fff; }
        .btn-download { background: #2d5a27; color: #fff; margin-top: 15px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn btn-upload" onclick="document.getElementById('atletaInput').click()">1. Selecionar Foto</button>
    <input type="file" id="atletaInput" accept="image/*">

    <div class="preview">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <label>Nome do Atleta</label>
        <input type="text" id="nomeInput" placeholder="NOME DO ATLETA">
        <label>Equipe</label>
        <input type="text" id="equipeInput" placeholder="EQUIPE">
        
        <label>Ajustes da Foto</label>
        <input type="range" id="zoom" min="0.1" max="4" step="0.01" value="1.2">
        <input type="range" id="posX" min="-800" max="800" value="0">
        <input type="range" id="posY" min="-800" max="800" value="0">
    </div>

    <button class="btn btn-download" id="downloadBtn">2. Baixar Imagem</button>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const imgMoldura = new Image();
    const imgAtleta = new Image();
    
    let molduraOK = false;
    let atletaOK = false;

    const W = 1080;
    const H = 1920;
    const area = { x: 124, y: 231, w: 832, h: 1046, r: 105 };

    imgMoldura.src = 'euvou.png'; 
    imgMoldura.onload = () => {
        molduraOK = true;
        canvas.width = W;
        canvas.height = H;
        render();
    };

    document.getElementById('atletaInput').onchange = e => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = ev => {
                imgAtleta.onload = () => { atletaOK = true; render(); };
                imgAtleta.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }
    };

    document.querySelectorAll('input').forEach(i => i.oninput = render);

    function render() {
        if (!molduraOK) return;
        ctx.clearRect(0, 0, W, H);

        // 1. Moldura de fundo
        ctx.drawImage(imgMoldura, 0, 0, W, H);

        // 2. Foto com recorte
        if (atletaOK) {
            ctx.save();
            drawRoundedRect(ctx, area.x, area.y, area.w, area.h, area.r);
            ctx.clip(); 
            const zoom = parseFloat(document.getElementById('zoom').value);
            const px = parseInt(document.getElementById('posX').value);
            const py = parseInt(document.getElementById('posY').value);
            const fw = imgAtleta.width * zoom;
            const fh = imgAtleta.height * zoom;
            ctx.drawImage(imgAtleta, (area.x + area.w/2) + px - fw/2, (area.y + area.h/2) + py - fh/2, fw, fh);
            ctx.restore();
        }

        // 3. Arte "EU VOU" idêntica à imagem (Estilo Pincel)
        renderEuVouIdentico();

        // 4. Nome e Equipe (Posicionados mais para cima)
        renderTextosAjustados();
    }

    function renderEuVouIdentico() {
        ctx.save();
        ctx.textAlign = "center";
        // Permanent Marker é a fonte que mais se aproxima do estilo pincel da imagem
        ctx.font = "140px 'Permanent Marker'"; 
        
        const x = W / 2;
        const y = 1180; 

        // Efeito levemente inclinado para a esquerda como na foto
        ctx.translate(x, y);
        ctx.rotate(-0.03); 

        // Cor verde exata do pincel
        ctx.fillStyle = "#33a34d"; 
        ctx.fillText("EU VOU", 0, 0);
        
        ctx.restore();
    }

    function renderTextosAjustados() {
        const nome = document.getElementById('nomeInput').value.toUpperCase().trim();
        const equipe = document.getElementById('equipeInput').value.toUpperCase().trim();
        ctx.textAlign = "center";

        if(nome) {
            ctx.fillStyle = "#1a3a16";
            ctx.font = "bold 65px sans-serif";
            // Subi a posição: de 1435 para 1350
            ctx.fillText(nome, W / 2, 1350); 
        }

        if(equipe) {
            ctx.fillStyle = "#555";
            ctx.font = "42px sans-serif";
            // Subi a posição: de 1505 para 1410
            ctx.fillText(equipe, W / 2, 1410);
        }
    }

    function drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    document.getElementById('downloadBtn').onclick = () => {
        if(!atletaOK) return alert("Selecione sua foto primeiro!");
        const link = document.createElement('a');
        link.download = 'saraletii_run.png';
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    };
</script>

</body>
</html>
