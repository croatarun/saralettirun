<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador Saraletii Run 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f7f6; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); max-width: 420px; width: 100%; }
        .preview { width: 100%; aspect-ratio: 9/16; background: #eee; border-radius: 12px; overflow: hidden; margin: 15px 0; border: 1px solid #ddd; }
        canvas { width: 100%; height: 100%; display: block; image-rendering: -webkit-optimize-contrast; }
        .controls { background: #fdfdfd; padding: 18px; border-radius: 15px; border: 1px solid #eaeaea; }
        label { font-size: 10px; font-weight: 800; color: #888; display: block; margin-bottom: 5px; margin-top: 12px; text-transform: uppercase; letter-spacing: 1px; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; margin-bottom: 8px; font-family: 'Montserrat', sans-serif; font-weight: 700; }
        input[type="range"] { width: 100%; margin-bottom: 10px; accent-color: #2d5a27; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-upload { background: #000; color: #fff; }
        .btn-download { background: #2d5a27; color: #fff; margin-top: 15px; box-shadow: 0 4px 12px rgba(45, 90, 39, 0.3); }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn btn-upload" onclick="document.getElementById('atletaInput').click()">1. Carregar Foto</button>
    <input type="file" id="atletaInput" accept="image/*">

    <div class="preview">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <label>Atleta</label>
        <input type="text" id="nomeInput" placeholder="NOME DO ATLETA" maxlength="25">
        <label>Equipe</label>
        <input type="text" id="equipeInput" placeholder="NOME DA EQUIPE" maxlength="25">
        
        <label>Ajuste da Imagem</label>
        <input type="range" id="zoom" min="0.1" max="4" step="0.01" value="1.2">
        <input type="range" id="posX" min="-800" max="800" value="0">
        <input type="range" id="posY" min="-800" max="800" value="0">
    </div>

    <button class="btn btn-download" id="downloadBtn">2. Baixar Story</button>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const imgMoldura = new Image();
    const imgAtleta = new Image();
    
    let molduraOK = false;
    let atletaOK = false;

    // Resolução 4K para garantir máxima qualidade na postagem
    const W = 1080;
    const H = 1920;
    const area = { x: 124, y: 231, w: 832, h: 1046, r: 105 };

    imgMoldura.src = 'euvou.png'; 
    imgMoldura.onload = () => {
        molduraOK = true;
        canvas.width = W;
        canvas.height = H;
        render();
    };

    document.getElementById('atletaInput').onchange = e => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = ev => {
                imgAtleta.onload = () => { atletaOK = true; render(); };
                imgAtleta.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }
    };

    document.querySelectorAll('input').forEach(i => i.oninput = render);

    function render() {
        if (!molduraOK) return;
        
        // Ativando suavização de imagem
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        
        ctx.clearRect(0, 0, W, H);

        // 1. Moldura
        ctx.drawImage(imgMoldura, 0, 0, W, H);

        // 2. Foto com máscara
        if (atletaOK) {
            ctx.save();
            drawRoundedRect(ctx, area.x, area.y, area.w, area.h, area.r);
            ctx.clip(); 
            const zoom = parseFloat(document.getElementById('zoom').value);
            const px = parseInt(document.getElementById('posX').value);
            const py = parseInt(document.getElementById('posY').value);
            const fw = imgAtleta.width * zoom;
            const fh = imgAtleta.height * zoom;
            ctx.drawImage(imgAtleta, (area.x + area.w/2) + px - fw/2, (area.y + area.h/2) + py - fh/2, fw, fh);
            ctx.restore();
        }

        // 3. Arte "EU VOU" - Aumentada e com mais definição
        renderEuVouPremium();

        // 4. Nome e Equipe - Qualidade Tipográfica
        renderTextosPremium();
    }

    function renderEuVouPremium() {
        ctx.save();
        ctx.textAlign = "center";
        // Aumentado de 140 para 165
        ctx.font = "165px 'Permanent Marker'"; 
        
        const x = W / 2;
        const y = 1190; 

        ctx.translate(x, y);
        ctx.rotate(-0.04); // Inclinado conforme referência

        // Sombra suave para dar destaque
        ctx.shadowColor = "rgba(0,0,0,0.2)";
        ctx.shadowBlur = 10;

        ctx.fillStyle = "#2d8a42"; 
        ctx.fillText("EU VOU", 0, 0);
        
        ctx.restore();
    }

    function renderTextosPremium() {
        const nome = document.getElementById('nomeInput').value.toUpperCase().trim();
        const equipe = document.getElementById('equipeInput').value.toUpperCase().trim();
        
        ctx.textAlign = "center";
        ctx.textRendering = "optimizeLegibility";

        if(nome) {
            // Nome do Atleta - Forte e legível
            ctx.fillStyle = "#1a3a16";
            ctx.font = "800 72px 'Montserrat'"; // Fonte Montserrat pesada para qualidade
            ctx.letterSpacing = "2px"; // Espaçamento moderno
            ctx.fillText(nome, W / 2, 1340); 
        }

        if(equipe) {
            // Equipe - Estilo clean
            ctx.fillStyle = "#555";
            ctx.font = "700 42px 'Montserrat'";
            ctx.letterSpacing = "4px";
            ctx.fillText(equipe, W / 2, 1400);
        }
    }

    function drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    document.getElementById('downloadBtn').onclick = () => {
        if(!atletaOK) return alert("Selecione sua foto primeiro!");
        const link = document.createElement('a');
        link.download = 'saraletii-run-2026.png';
        // Gerando em PNG de alta qualidade
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    };
</script>

</body>
</html>
