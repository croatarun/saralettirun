<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador Saraletii Run 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); max-width: 420px; width: 100%; }
        .preview { width: 100%; aspect-ratio: 9/16; background: #eee; border-radius: 12px; overflow: hidden; margin: 15px 0; border: 1px solid #ddd; }
        canvas { width: 100%; height: 100%; display: block; }
        .controls { background: #fdfdfd; padding: 18px; border-radius: 15px; border: 1px solid #eaeaea; }
        label { font-size: 10px; font-weight: 800; color: #888; display: block; margin-bottom: 5px; margin-top: 12px; text-transform: uppercase; letter-spacing: 1px; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; margin-bottom: 8px; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 14px; }
        input[type="range"] { width: 100%; margin-bottom: 10px; accent-color: #2d5a27; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn-upload { background: #000; color: #fff; }
        .btn-download { background: #2d5a27; color: #fff; margin-top: 15px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn btn-upload" onclick="document.getElementById('atletaInput').click()">1. CARREGAR FOTO</button>
    <input type="file" id="atletaInput" accept="image/*">

    <div class="preview">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <label>Nome do Atleta</label>
        <input type="text" id="nomeInput" placeholder="NOME DO ATLETA">
        <label>Equipe</label>
        <input type="text" id="equipeInput" placeholder="NOME DA EQUIPE">
        
        <label>Ajuste de Imagem</label>
        <input type="range" id="zoom" min="0.1" max="4" step="0.01" value="1.2">
        <input type="range" id="posX" min="-800" max="800" value="0">
        <input type="range" id="posY" min="-800" max="800" value="0">
    </div>

    <button class="btn btn-download" id="downloadBtn">2. BAIXAR STORY HD</button>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const imgMoldura = new Image();
    const imgAtleta = new Image();
    
    // Dimensões base para Stories (1080x1920)
    const W = 1080;
    const H = 1920;
    const area = { x: 124, y: 231, w: 832, h: 1046, r: 105 };

    // Melhoria de Qualidade: Multiplicador de Resolução
    const scale = 2; 

    imgMoldura.src = 'euvou.png'; 
    imgMoldura.onload = () => {
        setupCanvas();
        render();
    };

    function setupCanvas() {
        // Configuramos o canvas para ter o dobro de pixels reais para nitidez extrema
        canvas.width = W * scale;
        canvas.height = H * scale;
        ctx.scale(scale, scale); // Escala todas as operações de desenho
        
        // Suavização de imagem ativada
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
    }

    document.getElementById('atletaInput').onchange = e => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = ev => {
                imgAtleta.onload = () => { render(); };
                imgAtleta.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }
    };

    document.querySelectorAll('input').forEach(i => i.oninput = render);

    function render() {
        if (!imgMoldura.complete) return;
        
        ctx.clearRect(0, 0, W, H);

        // 1. Moldura
        ctx.drawImage(imgMoldura, 0, 0, W, H);

        // 2. Foto Atleta
        if (imgAtleta.src) {
            ctx.save();
            drawRoundedRect(ctx, area.x, area.y, area.w, area.h, area.r);
            ctx.clip(); 
            const zoom = parseFloat(document.getElementById('zoom').value);
            const px = parseInt(document.getElementById('posX').value);
            const py = parseInt(document.getElementById('posY').value);
            const fw = imgAtleta.width * zoom;
            const fh = imgAtleta.height * zoom;
            ctx.drawImage(imgAtleta, (area.x + area.w/2) + px - fw/2, (area.y + area.h/2) + py - fh/2, fw, fh);
            ctx.restore();
        }

        // 3. Arte "EU VOU" (Aumentada e Centralizada)
        renderEuVouHD();

        // 4. Textos (Nome e Equipe com nitidez máxima)
        renderTextosHD();
    }

    function renderEuVouHD() {
        ctx.save();
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        // Estilo pincel aumentado
        ctx.font = "italic 180px 'Permanent Marker'"; 
        
        const x = W / 2;
        const y = 1170; 

        ctx.translate(x, y);
        ctx.rotate(-0.04);

        // Cor Verde vibrante (idêntica à referência)
        ctx.fillStyle = "#33a34d"; 
        ctx.fillText("EU VOU", 0, 0);
        ctx.restore();
    }

    function renderTextosHD() {
        const nome = document.getElementById('nomeInput').value.toUpperCase().trim();
        const equipe = document.getElementById('equipeInput').value.toUpperCase().trim();
        
        ctx.textAlign = "center";

        if(nome) {
            // Nome do Atleta: Fonte Extra Bold para não pixelizar
            ctx.fillStyle = "#1a3a16";
            ctx.font = "900 78px 'Montserrat'"; 
            ctx.fillText(nome, W / 2, 1345); 
        }

        if(equipe) {
            // Equipe: Fonte clean
            ctx.fillStyle = "#444";
            ctx.font = "700 44px 'Montserrat'";
            ctx.fillText(equipe, W / 2, 1405);
        }
    }

    function drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    document.getElementById('downloadBtn').onclick = () => {
        if(!imgAtleta.src) return alert("Selecione sua foto primeiro!");
        
        // Baixa em alta resolução (PNG com escala 2x)
        const link = document.createElement('a');
        link.download = 'saraletii-run-hd.png';
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    };
</script>

</body>
</html>
